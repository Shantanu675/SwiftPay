server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  data:
    redis:
      host: redis   # ✅ changed
      port: 6379
      timeout: 2000ms

  cloud:
    gateway:

      httpclient:
        max-initial-line-length: 4096
        max-header-size: 8192

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestSize
          args:
            maxSize: 1048576

      routes:

        # USER SERVICE
        - id: user-service
          uri: http://user-service:8081   # ✅ changed
          predicates:
            - Path=/auth/**, /api/users/**

        # TRANSACTION SERVICE
        - id: transaction-service
          uri: http://transaction-service:8082   # ✅ changed
          predicates:
            - Path=/api/transactions/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # NOTIFICATION SERVICE
        - id: notification-service
          uri: http://notification-service:8084   # ✅ changed
          predicates:
            - Path=/api/notify/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # REWARD SERVICE
        - id: reward-service
          uri: http://reward-service:8085   # ⚠️ FIX PORT (you had 8089)
          predicates:
            - Path=/api/rewards/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # WALLET SERVICE
        - id: wallet-service
          uri: http://wallet-service:8088   # ⚠️ FIX PORT (you had 8088)
          predicates:
            - Path=/api/v1/wallets/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600